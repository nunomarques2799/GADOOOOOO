# Configuração do Netlify — Gestão de Gado (site estático)
# A pasta "website" é publicada tal como está.

[build]
  publish = "."

# O instalador é servido pelo GitHub Releases (link no botão de download),
# por isso não pesa no tráfego do Netlify.

# Cache dos ficheiros estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Página de recuperação de palavra-passe: /recuperar serve recuperar.html
# (o link do email de reposição aponta para https://gestaogado.netlify.app/recuperar).
[[redirects]]
  from = "/recuperar"
  to = "/recuperar.html"
  status = 200

# Páginas legais (RGPD) com URLs limpos.
[[redirects]]
  from = "/privacidade"
  to = "/privacidade.html"
  status = 200

[[redirects]]
  from = "/termos"
  to = "/termos.html"
  status = 200
