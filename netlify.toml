# Netlify — SITE DA APP (o que fica instalável no PC)
# ---------------------------------------------------------------------------
# Há dois sites Netlify neste repositório, e é a "base directory" de cada um
# que decide qual destes ficheiros é lido:
#
#   base = "website"  -> website/netlify.toml -> a página de apresentação
#   base = ""  (raiz) -> ESTE ficheiro        -> a app propriamente dita
#
# A app tem de ficar na RAIZ do seu próprio site, e não numa subpasta do outro:
# o build do Expo referencia tudo por caminhos absolutos (`/_expo/...`) e numa
# subpasta não encontrava nada. Mudar isso obrigava a mexer no `baseUrl` do
# Expo, o que partiria a app Windows, que serve estes mesmos ficheiros a partir
# da raiz de um servidor local (ver desktop/main.js).

[build]
  command = "npx expo export --platform web"
  publish = "dist"
  # Sem isto, QUALQUER push reconstruía a app — incluindo mexer só no site de
  # apresentação, na documentação ou nos workflows. O plano grátis do Netlify
  # tem um teto de minutos de build por mês, e não vale gastá-los a reconstruir
  # uma app que não mudou.
  #
  # Como funciona: sair com código 0 CANCELA o build. É exatamente o que o
  # `git diff --quiet` faz quando não há alterações nos caminhos indicados.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- src public assets app.json package.json package-lock.json netlify.toml"

[build.environment]
  NODE_VERSION = "22"
  # As chaves do Supabase têm de estar presentes no build, senão a app sai em
  # modo demo offline (dados de exemplo, sem login). É a mesma razão pela qual
  # estão no build-windows.yml. A chave é a PUBLISHABLE — segura no cliente,
  # protegida por RLS — e já vai embutida no JavaScript servido a toda a gente,
  # por isso não há aqui segredo nenhum a proteger.
  EXPO_PUBLIC_SUPABASE_URL = "https://qmkafibxlmgouslybafy.supabase.co"
  EXPO_PUBLIC_SUPABASE_KEY = "sb_publishable_6bjhd0CNIAglOPGmBt9Zlw_2gE4tr_r"

# ---------------------------------------------------------------------------
# TUDO O QUE NÃO É O BRANCH DE PRODUÇÃO LIGA-SE À BASE DE DADOS DE TESTES
# ---------------------------------------------------------------------------
# `[build.environment]` acima aplica-se a todos os contextos; estes blocos
# sobrepõem-se-lhe em tudo o que NÃO seja o branch de produção (`main`):
#
#   branch-deploy  -> qualquer branch publicado que não o `main` (ex.: `dev`)
#   deploy-preview -> a pré-visualização de um pull request
#
# São dois blocos e não um bloco `[context.dev]` de propósito. Um bloco com o
# nome do branch protegia só o `dev` e deixava qualquer OUTRO branch — ou a
# pré-visualização do próprio pull request de `dev` para `main` — a arrancar
# com as chaves de produção. Uma pré-visualização ligada à base do criador é
# uma app a sério, com os dados dele, e sem nada no ecrã a avisar disso.
#
# Assim, a regra fica simples de verificar: só o `main` fala com produção.
# EXPO_PUBLIC_AMBIENTE=dev acende a faixa roxa no topo (ver AMBIENTES.md).
[context.branch-deploy.environment]
  EXPO_PUBLIC_SUPABASE_URL = "https://wkaxskxfcnexiutjewui.supabase.co"
  EXPO_PUBLIC_SUPABASE_KEY = "sb_publishable_YfMkGOsrK6nrctci_jwlkg_J8Vl4F_W"
  EXPO_PUBLIC_AMBIENTE = "dev"

[context.deploy-preview.environment]
  EXPO_PUBLIC_SUPABASE_URL = "https://wkaxskxfcnexiutjewui.supabase.co"
  EXPO_PUBLIC_SUPABASE_KEY = "sb_publishable_YfMkGOsrK6nrctci_jwlkg_J8Vl4F_W"
  EXPO_PUBLIC_AMBIENTE = "dev"

# O service worker NÃO pode ser guardado em cache pelo navegador: é o ficheiro
# que anuncia que existe versão nova. Guardado, a app ficaria presa numa versão
# antiga e nada no ecrã explicaria porquê.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

# Estes têm o conteúdo no nome (`...-<hash>.js`), por isso podem ficar em cache
# para sempre: quando o build muda, o nome muda.
[[headers]]
  for = "/_expo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# A app é uma SPA (`web.output: "single"` no app.json): o encaminhamento é feito
# no navegador, por isso qualquer endereço tem de devolver o index.html. Sem
# isto, abrir /animais diretamente — ou recarregar lá dentro — dava 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
