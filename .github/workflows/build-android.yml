name: Build Android app

# Constrói o APK para Android via EAS Build (nuvem da Expo — não precisa de
# Android SDK no runner) e publica-o num GitHub Release fixo (tag
# "android-latest") para que o site possa apontar sempre para o mesmo URL:
#   releases/download/android-latest/GestaoDeGado-Android.apk
#
# Requer o secret EXPO_TOKEN (Perfil Expo → Access Tokens → criar token robô).
#
# Corre em push para main e manualmente. O AAB (production, para a Play Store)
# tem de ser gerado manualmente com `eas build --platform android --profile
# production` ou via workflow_dispatch com perfil=production.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "app.json"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:
    inputs:
      perfil:
        description: "Perfil EAS a construir"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

permissions:
  contents: write # criar/atualizar o Release android-latest

jobs:
  build:
    name: Build Android (EAS)
    runs-on: ubuntu-latest
    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Instalar dependências da app
        run: npm ci

      - name: Escolher perfil
        id: perfil
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "nome=${{ github.event.inputs.perfil }}" >> "$GITHUB_OUTPUT"
          else
            echo "nome=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Construir Android (espera a conclusão)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Sem estas variáveis a app sai em modo demo offline. Chave publishable
          # (segura para o cliente, protegida por RLS).
          EXPO_PUBLIC_SUPABASE_URL: https://qmkafibxlmgouslybafy.supabase.co
          EXPO_PUBLIC_SUPABASE_KEY: sb_publishable_6bjhd0CNIAglOPGmBt9Zlw_2gE4tr_r
        run: |
          eas build \
            --platform android \
            --profile ${{ steps.perfil.outputs.nome }} \
            --non-interactive \
            --wait

      - name: Descarregar o artefacto do último build
        # Só publicamos APK (perfil preview). Production gera AAB e é para a
        # Play Store, não faz sentido pôr num link direto.
        if: steps.perfil.outputs.nome == 'preview'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const b=JSON.parse(d)[0];console.log(b.artifacts.buildUrl||b.artifacts.applicationArchiveUrl);});")
          echo "URL do APK: $URL"
          curl -L -o GestaoDeGado-Android.apk "$URL"
          ls -lh GestaoDeGado-Android.apk

      - name: Publicar no Release fixo (android-latest)
        # Um único Release cuja tag nunca muda: o site aponta para este URL fixo
        # e o APK é sempre substituído em cada push. Assim, o botão do site
        # nunca precisa de ser tocado.
        if: steps.perfil.outputs.nome == 'preview'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view android-latest >/dev/null 2>&1; then
            gh release upload android-latest GestaoDeGado-Android.apk --clobber
          else
            gh release create android-latest GestaoDeGado-Android.apk \
              --title "App Android (mais recente)" \
              --notes "APK mais recente da app para Android. Instale abrindo o ficheiro no telemóvel (talvez seja preciso permitir 'origens desconhecidas')."
          fi
