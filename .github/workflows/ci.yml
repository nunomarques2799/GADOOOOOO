name: Qualidade (tsc + testes)

# Porta de qualidade: verifica os tipos E corre os testes antes de qualquer
# merge/build. Corre em todos os pushes e pull requests. É rápido (~1 min).
#
# O `tsc` apanha nomes de ícones inválidos, imports partidos e erros de rotas do
# expo-router — foi assim que 3 erros de compilação tinham chegado ao repositório.
#
# Os testes cobrem os prazos legais (DGAV/SNIRA — onde um erro custa uma coima ao
# criador) e a camada offline-first (onde um erro apaga registos sem avisar).
# Até 2026-07-18 existiam mas nunca corriam aqui: um teste que ninguém executa
# não protege nada.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Verificar tipos (tsc)
        run: npx tsc --noEmit

      - name: Correr os testes
        run: npm test -- --ci
