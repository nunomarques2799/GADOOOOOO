name: Build Windows app

# Reconstrói a app para Windows e publica o instalador num GitHub Release novo
# (tag v1.0.<n>) sempre que houver alterações à app.
#
# O instalador tem nome fixo, por isso o site aponta sempre para
# .../releases/latest/download/GestaoDeGado-Setup.exe e nunca precisa de ser
# tocado. Ao lado vai um latest.yml, que é o que as apps já instaladas leem para
# se atualizarem sozinhas (electron-updater) — daí a versão ter de subir a cada
# publicação, senão o updater não reconhece o build como mais recente.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "assets/**"
      - "public/**" # o index.html e o service worker da web vão dentro do .exe
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "desktop/**"
      - ".github/workflows/build-windows.yml"
  workflow_dispatch: {} # permite correr à mão no separador "Actions"

permissions:
  contents: write # necessário para criar/atualizar o Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências da app
        run: npm ci

      - name: Definir a versão desta publicação
        # O electron-updater compara versões semver: a app só se atualiza se a
        # versão publicada for MAIOR do que a instalada. github.run_number é
        # sempre crescente, o que dá 1.0.1, 1.0.2, ... sem ninguém ter de mexer.
        id: versao
        shell: bash
        working-directory: desktop
        run: |
          VERSAO="1.0.${{ github.run_number }}"
          npm version "$VERSAO" --no-git-tag-version --allow-same-version
          echo "versao=$VERSAO" >> "$GITHUB_OUTPUT"
          echo "A publicar a versão $VERSAO"

      - name: Gerar o build web (Expo)
        # As chaves do Supabase têm de estar presentes no build, senão a app
        # sai em modo demo offline (dados de exemplo, sem login). O .env está
        # no .gitignore, por isso não chega ao CI — injetamo-las aqui. A chave
        # é a PUBLISHABLE (segura para o cliente, protegida por RLS); já fica
        # embutida no .zip distribuído, logo não há segredo a proteger.
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://qmkafibxlmgouslybafy.supabase.co
          EXPO_PUBLIC_SUPABASE_KEY: sb_publishable_6bjhd0CNIAglOPGmBt9Zlw_2gE4tr_r
        run: npx expo export --platform web

      - name: Copiar o build web para o desktop
        shell: bash
        run: |
          rm -rf desktop/web
          cp -r dist desktop/web

      - name: Instalar dependências do desktop
        working-directory: desktop
        run: npm ci

      - name: Empacotar e publicar o instalador (Electron)
        # O --publish always faz o electron-builder criar o Release v<versão> e
        # enviar para lá o instalador E o latest.yml (os metadados que as apps
        # instaladas leem para se atualizarem). Fazer o upload à mão partiria a
        # atualização automática, por faltar o latest.yml.
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # sem assinatura de código
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # o electron-builder publica com este token
        run: npx electron-builder --win --x64 --publish always
